<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santos Imobiliário — Jogo de Tabuleiro Online</title>

    <!-- SEO -->
    <meta name="description" content="Santos Imobiliário: o clássico jogo de compra e venda de imóveis ambientado na cidade de Santos. Jogue no navegador contra amigos ou bots.">
    <meta name="keywords" content="Santos Imobiliário, jogo de tabuleiro, monopoly, Santos, jogo online, imóveis, caiçara">
    <meta name="author" content="Miguel Cristiano, Fabricio Vasconcellos">
    <meta name="robots" content="index, follow">

    <!-- Open Graph (compartilhamento em redes sociais) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Santos Imobiliário — Jogo de Tabuleiro Online">
    <meta property="og:description" content="O clássico jogo de compra e venda de imóveis ambientado na cidade de Santos. Jogue no navegador contra amigos ou bots.">
    <meta property="og:locale" content="pt_BR">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Overlay de Setup Inicial -->
        <div id="setup-overlay" class="modal-overlay">
            <div class="modal-content setup-modal">
                <h2>Santos Imobiliário</h2>
                <p>Configure sua partida caiçara</p>

                <div id="player-setup-list">
                    <!-- Lista de jogadores para configurar -->
                </div>

                <div class="setup-actions">
                    <button id="add-player-btn" class="action-button modal-btn secondary">➕ ADICIONAR JOGADOR</button>
                    <button id="start-game-btn" class="action-button modal-btn">INICIAR JOGO</button>
                </div>
            </div>
        </div>

        <main id="main-layout">
            <div id="board-scaler">
                <div id="board" class="board">
                    <!-- O tabuleiro será renderizado dinamicamente via JS -->
                    <div class="board-center">
                        <button id="roll-button" class="action-button">ROLAR DADOS</button>
                        <div id="dice-area"></div>
                        <div id="card-display"></div>
                        <div id="game-log"></div>
                    </div>
                </div>
            </div>

            <aside id="sidebar">
                <header>
                    <h1 id="game-title">Santos Imobiliário</h1>
                    <div class="print-menu">
                        <button class="print-menu-btn" id="print-menu-btn" title="Versões para impressão">🖨️</button>
                        <div class="print-menu-dropdown" id="print-menu-dropdown">
                            <a href="print.html" target="_blank">🗺️ Tabuleiro (A2)</a>
                            <a href="print-cards.html" target="_blank">🃏 Cartas Sorte / Revés</a>
                            <a href="print-deeds.html" target="_blank">📄 Títulos de Posse</a>
                            <a href="print-money.html" target="_blank">💵 Notas de Dinheiro</a>
                            <a href="print-rules.html" target="_blank">📋 Regras do Jogo</a>
                        </div>
                    </div>
                </header>
                <div id="player-panels">
                    <!-- Painéis dos jogadores preenchidos via JS -->
                </div>
            </aside>
        </main>

        <section id="ui-layer">
            <!-- Modais e notificações -->
        </section>

        <footer id="game-footer">
            <span>Santos Imobiliário &copy; <span id="footer-year"></span></span>
            <span class="footer-sep">·</span>
            <span>Miguel Cristiano &amp; Fabricio Vasconcellos</span>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
